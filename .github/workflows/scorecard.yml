name: Scorecard

# OpenSSF Scorecard supply-chain security analysis. Uploads SARIF to code
# scanning and (on public repos) publishes to the OpenSSF REST API, which
# powers the README badge. Auto-enables on public repos; set the
# SCORECARD_ENABLED repo variable to 'true'/'false' to override.

on:
  branch_protection_rule:
  schedule:
    - cron: '34 2 * * 2'
  push:
    branches: [main]
  workflow_dispatch:

# Top level stays read-only: the OpenSSF publish step rejects results when
# id-token/security-events write scopes are granted workflow-wide, so those
# live only on the job below.
permissions:
  contents: read
  actions: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: |
      vars.SCORECARD_ENABLED == 'true' ||
      (vars.SCORECARD_ENABLED != 'false' && github.event.repository.visibility == 'public')
    permissions:
      security-events: write   # upload the SARIF results to code scanning
      id-token: write          # publish results to the OpenSSF REST API (badge)
      contents: read
      actions: read
    steps:
      - name: Harden the runner (audit outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
